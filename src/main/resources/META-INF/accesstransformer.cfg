# Access Transformers widen the visibility of vanilla Minecraft members so mods can
# read/use them. Format: <access> <fully.qualified.ClassName> <memberName>
#
# We need ServerPlayerGameMode's mining state to detect "is the player currently
# holding left-click to mine this block?" on the server, which has no public getter.

public net.minecraft.server.level.ServerPlayerGameMode isDestroyingBlock
public net.minecraft.server.level.ServerPlayerGameMode destroyPos
